version: "3.9"

networks:
  purple_net:
    external: true

services:

  # ─────────────────────────────────────────
  # FRONTEND — React + Vite
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: purple_frontend
    restart: unless-stopped
    networks:
      - purple_net

  # ─────────────────────────────────────────
  # BACKEND — FastAPI
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: purple_backend
    restart: unless-stopped
    networks:
      - purple_net
    environment:
      - FREQTRADE_URL=http://r8ivtmv3206l0yu32lwf4o3t.147.93.68.31.sslip.io:8080
      - FREQTRADE_USER=${FREQTRADE_USER}
      - FREQTRADE_PASSWORD=${FREQTRADE_PASSWORD}
      - DATABASE_URL=${DATABASE_URL}
      - ENV=production