version: "3.9"

services:

  # ─────────────────────────────────────────
  # FRONTEND — React + Vite
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: purple_frontend
    restart: unless-stopped

  # ─────────────────────────────────────────
  # BACKEND — FastAPI
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: purple_backend
    restart: unless-stopped
    environment:
      # Após subir o Freqtrade no Coolify, substitua pelo hostname gerado
      # Ex: https://abc123.seuservidor.coolify.io
      # Quando aplicar subdomínio próprio: https://bot.seudominio.com
      - FREQTRADE_URL=${FREQTRADE_URL}
      - FREQTRADE_USER=${FREQTRADE_USER}
      - FREQTRADE_PASSWORD=${FREQTRADE_PASSWORD}
      - DATABASE_URL=${DATABASE_URL}
      - ENV=production