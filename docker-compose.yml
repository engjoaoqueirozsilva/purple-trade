networks:
  purple_net:
    driver: bridge

volumes:
  freqtrade_data:

services:

  # ─────────────────────────────────────────
  # FRONTEND — React + Vite
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: purple_frontend
    restart: unless-stopped
    networks:
      - purple_net

  # ─────────────────────────────────────────
  # BACKEND — FastAPI
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: purple_backend
    restart: unless-stopped
    environment:
      - FREQTRADE_URL=http://freqtrade:8080
      - FREQTRADE_USER=${FREQTRADE_USER}
      - FREQTRADE_PASSWORD=${FREQTRADE_PASSWORD}
      - DATABASE_URL=${DATABASE_URL}
      - ENV=production
    networks:
      - purple_net
    depends_on:
      - freqtrade

  # ─────────────────────────────────────────
  # FREQTRADE — Bot de trading
  # Sem exposição externa — acessível apenas pelo backend via rede interna
  # ─────────────────────────────────────────
  freqtrade:
    build:
      context: ./freqtrade
      dockerfile: Dockerfile
    container_name: purple_freqtrade
    restart: unless-stopped
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/tradesv3_live_testnet.sqlite
      --config /freqtrade/user_data/config.json
      --strategy PurpleRSIEMA
    networks:
      - purple_net